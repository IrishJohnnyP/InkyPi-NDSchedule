<div class="form-group">
  <label for="season_year" class="form-label">Season year</label>
  <select class="form-select" id="season_year" name="season_year"></select>
  <small class="form-text text-muted">Defaults to current season if not selected. Shows the last 5 seasons.</small>
</div>
<div class="form-group mt-3">
  <label for="font_size" class="form-label">Font size</label>
  <select class="form-select" id="font_size" name="font_size">
    <option value="normal">Normal</option>
    <option value="large">Large</option>
    <option value="larger">Larger</option>
    <option value="largest">Largest</option>
  </select>
</div>
<input type="hidden" id="compact_mode" name="compact_mode" value="false" />
<input type="hidden" id="show_rank" name="show_rank" value="true" />
<input type="hidden" id="hide_rank" name="hide_rank" value="false" />
<input type="hidden" id="hide_nickname" name="hide_nickname" value="false" />
<input type="hidden" id="hide_logo" name="hide_logo" value="false" />

<div class="form-check mt-3">
  <input class="form-check-input" type="checkbox" id="compact_mode_checkbox">
  <label class="form-check-label" for="compact_mode_checkbox">Compact mode</label>
</div>
<div class="form-check mt-2">
  <input class="form-check-input" type="checkbox" id="show_rank_checkbox">
  <label class="form-check-label" for="show_rank_checkbox">Show opponent rank (Top 25; CFP preferred, else AP)</label>
  <small class="form-text text-muted d-block">Rankings are only displayed for the current season.</small>
</div>
<div class="form-check mt-2">
  <input class="form-check-input" type="checkbox" id="hide_rank_checkbox">
  <label class="form-check-label" for="hide_rank_checkbox">Hide rank in list</label>
</div>
<div class="form-check mt-2">
  <input class="form-check-input" type="checkbox" id="hide_nickname_checkbox">
  <label class="form-check-label" for="hide_nickname_checkbox">Hide nickname in list</label>
</div>
<div class="form-check mt-2">
  <input class="form-check-input" type="checkbox" id="hide_logo_checkbox">
  <label class="form-check-label" for="hide_logo_checkbox">Hide opponent logo</label>
</div>

<div class="form-group mt-3">
  <label for="cache_minutes" class="form-label">Cache (minutes)</label>
  <input class="form-control" type="number" id="cache_minutes" name="cache_minutes" min="0" max="1440" value="30">
  <small class="form-text text-muted">0 disables caching.</small>
</div>
<script>
  function toBool(v, fallback=true) {
    if (v === undefined || v === null) return fallback;
    if (typeof v === 'boolean') return v;
    const s = String(v).toLowerCase().trim();
    if (['1','true','yes','on','checked'].includes(s)) return true;
    if (['0','false','no','off',''].includes(s)) return false;
    return fallback;
  }
  function syncHiddenBool(hiddenId, checkboxId) {
    const hidden = document.getElementById(hiddenId);
    const cb = document.getElementById(checkboxId);
    if (!hidden || !cb) return;
    hidden.value = cb.checked ? 'true' : 'false';
  }
  function populateYears() {
    const sel = document.getElementById('season_year');
    if (!sel) return;
    sel.innerHTML = '';
    const optAuto = document.createElement('option');
    optAuto.value = '';
    optAuto.textContent = 'Current (auto)';
    sel.appendChild(optAuto);
    const nowYear = new Date().getFullYear();
    for (let y = nowYear; y >= nowYear - 4; y--) {
      const o = document.createElement('option');
      o.value = String(y);
      o.textContent = String(y);
      sel.appendChild(o);
    }
  }
  document.addEventListener('DOMContentLoaded', () => {
    populateYears();
    const ps = (typeof pluginSettings !== 'undefined') ? pluginSettings : {};

    document.getElementById('season_year').value = (ps.season_year || '');
    document.getElementById('font_size').value = (ps.font_size || 'normal');
    document.getElementById('cache_minutes').value = (ps.cache_minutes ?? 30);

    document.getElementById('compact_mode_checkbox').checked = toBool(ps.compact_mode, false);
    document.getElementById('show_rank_checkbox').checked = toBool(ps.show_rank, true);
    document.getElementById('hide_rank_checkbox').checked = toBool(ps.hide_rank, false);
    document.getElementById('hide_nickname_checkbox').checked = toBool(ps.hide_nickname, false);
    document.getElementById('hide_logo_checkbox').checked = toBool(ps.hide_logo, false);

    syncHiddenBool('compact_mode', 'compact_mode_checkbox');
    syncHiddenBool('show_rank', 'show_rank_checkbox');
    syncHiddenBool('hide_rank', 'hide_rank_checkbox');
    syncHiddenBool('hide_nickname', 'hide_nickname_checkbox');
    syncHiddenBool('hide_logo', 'hide_logo_checkbox');

    document.getElementById('compact_mode_checkbox').addEventListener('change', () => syncHiddenBool('compact_mode', 'compact_mode_checkbox'));
    document.getElementById('show_rank_checkbox').addEventListener('change', () => syncHiddenBool('show_rank', 'show_rank_checkbox'));
    document.getElementById('hide_rank_checkbox').addEventListener('change', () => syncHiddenBool('hide_rank', 'hide_rank_checkbox'));
    document.getElementById('hide_nickname_checkbox').addEventListener('change', () => syncHiddenBool('hide_nickname', 'hide_nickname_checkbox'));
    document.getElementById('hide_logo_checkbox').addEventListener('change', () => syncHiddenBool('hide_logo', 'hide_logo_checkbox'));
  });
</script>
