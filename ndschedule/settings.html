<!-- NdSchedule settings (persistent checkboxes)

Fix: checkboxes now submit and persist via name= plus a hidden false input.
-->

<div class="form-group">
  <label for="target_display" class="form-label">Target display</label>
  <select class="form-select" id="target_display" name="target_display">
    <option value="auto">Auto (use configured device)</option>
    <option value="pimoroni_73">Pimoroni Inky Impression 7.3&quot; (800×480)</option>
    <option value="pimoroni_133">Pimoroni Inky Impression 13.3&quot; (1600×1200)</option>
  </select>
</div>

<input type="hidden" name="large_mode" value="false" />
<div class="form-check mt-3">
  <input class="form-check-input" type="checkbox" id="large_mode" name="large_mode" value="true">
  <label class="form-check-label" for="large_mode">Large Mode</label>
</div>

<input type="hidden" name="compact_mode" value="false" />
<div class="form-check mt-2">
  <input class="form-check-input" type="checkbox" id="compact_mode" name="compact_mode" value="true">
  <label class="form-check-label" for="compact_mode">Compact Mode</label>
</div>

<div class="form-group mt-3">
  <label for="season_year" class="form-label">Season year</label>
  <select class="form-select" id="season_year" name="season_year"></select>
</div>

<div class="form-group mt-3">
  <label for="font_size" class="form-label">Font size</label>
  <select class="form-select" id="font_size" name="font_size">
    <option value="normal">Normal</option>
    <option value="large">Large</option>
    <option value="larger">Larger</option>
    <option value="largest">Largest</option>
  </select>
</div>

<input type="hidden" name="show_time" value="false" />
<div class="form-check mt-2">
  <input class="form-check-input" type="checkbox" id="show_time" name="show_time" value="true">
  <label class="form-check-label" for="show_time">Show game time</label>
</div>

<input type="hidden" name="show_rank" value="false" />
<div class="form-check mt-2">
  <input class="form-check-input" type="checkbox" id="show_rank" name="show_rank" value="true">
  <label class="form-check-label" for="show_rank">Show opponent rank</label>
</div>

<input type="hidden" name="hide_rank" value="false" />
<div class="form-check mt-2">
  <input class="form-check-input" type="checkbox" id="hide_rank" name="hide_rank" value="true">
  <label class="form-check-label" for="hide_rank">Hide rank in list</label>
</div>

<input type="hidden" name="hide_nickname" value="false" />
<div class="form-check mt-2">
  <input class="form-check-input" type="checkbox" id="hide_nickname" name="hide_nickname" value="true">
  <label class="form-check-label" for="hide_nickname">Hide nickname in list</label>
</div>

<input type="hidden" name="hide_logo" value="false" />
<div class="form-check mt-2">
  <input class="form-check-input" type="checkbox" id="hide_logo" name="hide_logo" value="true">
  <label class="form-check-label" for="hide_logo">Hide opponent logo</label>
</div>

<div class="form-group mt-3">
  <label for="cache_minutes" class="form-label">Cache (minutes)</label>
  <input class="form-control" type="number" id="cache_minutes" name="cache_minutes" min="0" max="1440" value="30">
</div>

<script>
  function toBool(v, fallback=false) {
    if (v === undefined || v === null) return fallback;
    if (typeof v === 'boolean') return v;
    const s = String(v).toLowerCase().trim();
    if (['1','true','yes','on','checked'].includes(s)) return true;
    if (['0','false','no','off',''].includes(s)) return false;
    return fallback;
  }
  function populateYears() {
    const sel = document.getElementById('season_year');
    if (!sel) return;
    sel.innerHTML = '';
    const optAuto = document.createElement('option');
    optAuto.value = '';
    optAuto.textContent = 'Current (auto)';
    sel.appendChild(optAuto);
    const nowYear = new Date().getFullYear();
    for (let y = nowYear; y >= nowYear - 4; y--) {
      const o = document.createElement('option');
      o.value = String(y);
      o.textContent = String(y);
      sel.appendChild(o);
    }
  }
  document.addEventListener('DOMContentLoaded', () => {
    populateYears();
    const ps = (typeof pluginSettings !== 'undefined') ? pluginSettings : {};
    const setVal = (id, val) => { const el=document.getElementById(id); if(el && val !== undefined) el.value = val; };
    const setChk = (id, val) => { const el=document.getElementById(id); if(el) el.checked = toBool(val, el.checked); };

    setVal('target_display', ps.target_display || 'auto');
    setVal('season_year', ps.season_year || '');
    setVal('font_size', ps.font_size || 'normal');
    setVal('cache_minutes', ps.cache_minutes ?? 30);

    setChk('large_mode', ps.large_mode);
    setChk('compact_mode', ps.compact_mode);
    setChk('show_time', ps.show_time ?? true);
    setChk('show_rank', ps.show_rank ?? true);
    setChk('hide_rank', ps.hide_rank);
    setChk('hide_nickname', ps.hide_nickname);
    setChk('hide_logo', ps.hide_logo);
  });
</script>
