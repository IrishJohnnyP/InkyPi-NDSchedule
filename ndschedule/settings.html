<!-- NdSchedule settings (robust checkbox persistence)

Key change:
- Each checkbox now has a proper name= setting key.
- A hidden input of the same name is included first to ensure "false" is submitted when unchecked.
- This makes selections persist even if JavaScript fails.
-->

<div class="form-group">
  <label for="target_display" class="form-label">Target display</label>
  <select class="form-select" id="target_display" name="target_display">
    <option value="auto">Auto (use configured device)</option>
    <option value="pimoroni_73">Pimoroni Inky Impression 7.3&quot; (800×480)</option>
    <option value="pimoroni_133">Pimoroni Inky Impression 13.3&quot; (1600×1200)</option>
  </select>
</div>

<!-- Large Mode -->
<input type="hidden" name="large_mode" value="false" />
<div class="form-check mt-3">
  <input class="form-check-input" type="checkbox" id="large_mode_checkbox" name="large_mode" value="true">
  <label class="form-check-label" for="large_mode_checkbox">Large Mode</label>
  <small class="form-text text-muted d-block">Preset: Largest font + show everything.</small>
</div>

<!-- Compact Mode -->
<input type="hidden" name="compact_mode" value="false" />
<div class="form-check mt-3">
  <input class="form-check-input" type="checkbox" id="compact_mode_checkbox" name="compact_mode" value="true">
  <label class="form-check-label" for="compact_mode_checkbox">Compact Mode</label>
  <small class="form-text text-muted d-block">(Currently) same preset as Large Mode. We will adjust layout next.</small>
</div>

<div class="form-group mt-3">
  <label for="season_year" class="form-label">Season year</label>
  <select class="form-select" id="season_year" name="season_year"></select>
</div>

<div class="form-group mt-3">
  <label for="font_size" class="form-label">Font size</label>
  <select class="form-select" id="font_size" name="font_size">
    <option value="normal">Normal</option>
    <option value="large">Large</option>
    <option value="larger">Larger</option>
    <option value="largest">Largest</option>
  </select>
  <small class="form-text text-muted">Large/Compact modes force Largest.</small>
</div>

<!-- Show time -->
<input type="hidden" name="show_time" value="false" />
<div class="form-check mt-2">
  <input class="form-check-input" type="checkbox" id="show_time_checkbox" name="show_time" value="true">
  <label class="form-check-label" for="show_time_checkbox">Show game time</label>
</div>

<!-- Show rank -->
<input type="hidden" name="show_rank" value="false" />
<div class="form-check mt-2">
  <input class="form-check-input" type="checkbox" id="show_rank_checkbox" name="show_rank" value="true">
  <label class="form-check-label" for="show_rank_checkbox">Show opponent rank</label>
</div>

<!-- Hide rank -->
<input type="hidden" name="hide_rank" value="false" />
<div class="form-check mt-2">
  <input class="form-check-input" type="checkbox" id="hide_rank_checkbox" name="hide_rank" value="true">
  <label class="form-check-label" for="hide_rank_checkbox">Hide rank in list</label>
</div>

<!-- Hide nickname -->
<input type="hidden" name="hide_nickname" value="false" />
<div class="form-check mt-2">
  <input class="form-check-input" type="checkbox" id="hide_nickname_checkbox" name="hide_nickname" value="true">
  <label class="form-check-label" for="hide_nickname_checkbox">Hide nickname in list</label>
</div>

<!-- Hide logo -->
<input type="hidden" name="hide_logo" value="false" />
<div class="form-check mt-2">
  <input class="form-check-input" type="checkbox" id="hide_logo_checkbox" name="hide_logo" value="true">
  <label class="form-check-label" for="hide_logo_checkbox">Hide opponent logo</label>
</div>

<div class="form-group mt-3">
  <label for="cache_minutes" class="form-label">Cache (minutes)</label>
  <input class="form-control" type="number" id="cache_minutes" name="cache_minutes" min="0" max="1440" value="30">
</div>

<script>
  function toBool(v, fallback=false) {
    if (v === undefined || v === null) return fallback;
    if (typeof v === 'boolean') return v;
    const s = String(v).toLowerCase().trim();
    if (['1','true','yes','on','checked'].includes(s)) return true;
    if (['0','false','no','off',''].includes(s)) return false;
    return fallback;
  }

  function populateYears() {
    const sel = document.getElementById('season_year');
    if (!sel) return;
    sel.innerHTML = '';
    const optAuto = document.createElement('option');
    optAuto.value = '';
    optAuto.textContent = 'Current (auto)';
    sel.appendChild(optAuto);
    const nowYear = new Date().getFullYear();
    for (let y = nowYear; y >= nowYear - 4; y--) {
      const o = document.createElement('option');
      o.value = String(y);
      o.textContent = String(y);
      sel.appendChild(o);
    }
  }

  // Optional UI nicety: keep Large and Compact mutually exclusive.
  function enforceExclusive() {
    const large = document.getElementById('large_mode_checkbox');
    const compact = document.getElementById('compact_mode_checkbox');
    if (!large || !compact) return;

    large.addEventListener('change', () => {
      if (large.checked) compact.checked = false;
      // Also force font size dropdown visually
      if (large.checked) document.getElementById('font_size').value = 'largest';
    });

    compact.addEventListener('change', () => {
      if (compact.checked) large.checked = false;
      if (compact.checked) document.getElementById('font_size').value = 'largest';
    });
  }

  document.addEventListener('DOMContentLoaded', () => {
    populateYears();

    // If the host injects pluginSettings, use it to populate controls.
    const ps = (typeof pluginSettings !== 'undefined') ? pluginSettings : {};

    const setVal = (id, val) => { const el=document.getElementById(id); if(el) el.value = (val ?? el.value); };
    const setChk = (id, val) => { const el=document.getElementById(id); if(el) el.checked = toBool(val, el.checked); };

    setVal('target_display', ps.target_display || 'auto');
    setVal('season_year', ps.season_year || '');
    setVal('font_size', ps.font_size || 'normal');
    setVal('cache_minutes', (ps.cache_minutes ?? 30));

    setChk('large_mode_checkbox', ps.large_mode);
    setChk('compact_mode_checkbox', ps.compact_mode);
    setChk('show_time_checkbox', ps.show_time ?? true);
    setChk('show_rank_checkbox', ps.show_rank ?? true);
    setChk('hide_rank_checkbox', ps.hide_rank);
    setChk('hide_nickname_checkbox', ps.hide_nickname);
    setChk('hide_logo_checkbox', ps.hide_logo);

    // If Large/Compact checked, show dropdown as Largest
    if (document.getElementById('large_mode_checkbox').checked || document.getElementById('compact_mode_checkbox').checked) {
      document.getElementById('font_size').value = 'largest';
    }

    enforceExclusive();
  });
</script>
