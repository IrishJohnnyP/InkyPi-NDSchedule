<div class="form-group">
  <label for="season_year" class="form-label">Season year</label>
  <select class="form-select" id="season_year" name="season_year"></select>
  <small class="form-text text-muted">Defaults to current season if not selected. Shows the last 5 seasons.</small>
</div>

<div class="form-group mt-3">
  <label for="font_size" class="form-label">Font size</label>
  <select class="form-select" id="font_size" name="font_size">
    <option value="normal">Normal</option>
    <option value="large">Large</option>
    <option value="larger">Larger</option>
    <option value="largest">Largest</option>
  </select>
</div>

<input type="hidden" id="compact_mode" name="compact_mode" value="false" />
<input type="hidden" id="show_rank" name="show_rank" value="true" />
<input type="hidden" id="show_nickname" name="show_nickname" value="false" />

<div class="form-check mt-3">
  <input class="form-check-input" type="checkbox" id="compact_mode_checkbox">
  <label class="form-check-label" for="compact_mode_checkbox">Compact mode</label>
</div>

<div class="form-check mt-2">
  <input class="form-check-input" type="checkbox" id="show_rank_checkbox">
  <label class="form-check-label" for="show_rank_checkbox">Show opponent rank (Top 25; CFP preferred, else AP)</label>
  <small class="form-text text-muted d-block">Rankings are only displayed for the current season.</small>
</div>

<div class="form-check mt-2">
  <input class="form-check-input" type="checkbox" id="show_nickname_checkbox">
  <label class="form-check-label" for="show_nickname_checkbox">Show team nickname (smaller/lighter)</label>
</div>

<div class="form-group mt-3">
  <label for="cache_minutes" class="form-label">Cache (minutes)</label>
  <input class="form-control" type="number" id="cache_minutes" name="cache_minutes" min="0" max="1440" value="30">
  <small class="form-text text-muted">0 disables caching.</small>
</div>

<script>
  function toBool(v, fallback=true) {
    if (v === undefined || v === null) return fallback;
    if (typeof v === 'boolean') return v;
    const s = String(v).toLowerCase().trim();
    if (['1','true','yes','on','checked'].includes(s)) return true;
    if (['0','false','no','off',''].includes(s)) return false;
    return fallback;
  }
  function syncHidden(hiddenId, checkboxId) {
    const hidden = document.getElementById(hiddenId);
    const cb = document.getElementById(checkboxId);
    if (!hidden || !cb) return;
    hidden.value = cb.checked ? 'true' : 'false';
  }
  function populateYears() {
    const sel = document.getElementById('season_year');
    if (!sel) return;
    sel.innerHTML = '';
    const optAuto = document.createElement('option');
    optAuto.value = '';
    optAuto.textContent = 'Current (auto)';
    sel.appendChild(optAuto);
    const nowYear = new Date().getFullYear();
    for (let y = nowYear; y >= nowYear - 4; y--) {
      const o = document.createElement('option');
      o.value = String(y);
      o.textContent = String(y);
      sel.appendChild(o);
    }
  }

  document.addEventListener('DOMContentLoaded', () => {
    populateYears();

    if (typeof loadPluginSettings !== 'undefined') {
      document.getElementById('season_year').value = (pluginSettings.season_year || '');
      document.getElementById('font_size').value = pluginSettings.font_size || 'normal';
      document.getElementById('cache_minutes').value = pluginSettings.cache_minutes || 30;
      document.getElementById('compact_mode_checkbox').checked = toBool(pluginSettings.compact_mode, false);
      document.getElementById('show_rank_checkbox').checked = toBool(pluginSettings.show_rank, true);
      document.getElementById('show_nickname_checkbox').checked = toBool(pluginSettings.show_nickname, false);
    } else {
      document.getElementById('season_year').value = '';
      document.getElementById('compact_mode_checkbox').checked = false;
      document.getElementById('show_rank_checkbox').checked = true;
      document.getElementById('show_nickname_checkbox').checked = false;
      document.getElementById('font_size').value = 'normal';
    }

    syncHidden('compact_mode','compact_mode_checkbox');
    syncHidden('show_rank','show_rank_checkbox');
    syncHidden('show_nickname','show_nickname_checkbox');

    document.getElementById('compact_mode_checkbox').addEventListener('change', () => syncHidden('compact_mode','compact_mode_checkbox'));
    document.getElementById('show_rank_checkbox').addEventListener('change', () => syncHidden('show_rank','show_rank_checkbox'));
    document.getElementById('show_nickname_checkbox').addEventListener('change', () => syncHidden('show_nickname','show_nickname_checkbox'));
  });
</script>
